# go-tpm2 stack visualisation — read by layouts/partials/mesh.html.
#
# Four rows :
#   Apex   : the attest control-plane protocol (fleet admission on Quote).
#   Top    : the tpm2 command API (attestation · sealing · NV · EK/AK).
#   Middle : the common waist — single Transport interface + BE codec.
#   Bottom : the four transports + the real validation targets.
#
# Spheres flow common → tpm2 → transport → real TPM, encoding
# "one command API, four backplanes, validated on real hardware" ; an
# extra sphere rides attest → tpm2 for the admission-on-Quote protocol.

# ---------- Containers (back layer rectangles) ----------

# Apex band : the attest control-plane protocol — consumes tpm2.
[[containers]]
kind  = "rack"
x     = 410
y     = 0
w     = 380
h     = 62
label = "go-tpm2/attest — CONTROL-PLANE PROTOCOL"
lx    = 436
ly    = 24

# Top band : the command API.
[[containers]]
kind  = "dc"
x     = 60
y     = 110
w     = 1080
h     = 120
label = "TPM 2.0 COMMAND API"
lx    = 130
ly    = 100

# Middle band : common.
[[containers]]
kind  = "rack"
x     = 330
y     = 270
w     = 540
h     = 100
label = "go-tpm2/common — Transport · Regs · BE codec"
lx    = 400
ly    = 262

# Bottom band : transports + real targets.
[[containers]]
kind  = "dc"
x     = 60
y     = 420
w     = 1080
h     = 110
label = "TRANSPORTS · REAL VALIDATION TARGETS"
lx    = 130
ly    = 412

# ---------- Nodes ----------

# Apex : the attest control-plane protocol. It sits above the command API
# and consumes tpm2 — a node is admitted to a fleet only on a verified
# Quote (EK-bound AK · fresh nonce · golden PCR policy).
[[nodes]]
x = 600
y = 36
kind = "hub"
label = "attest · admission-on-Quote"
halo_r = 16
core_r = 9
label_y = 30

# Top row : the tpm2 command API. One emphasised node carrying the whole
# capability set, flanked by the two headline capability clusters.
