baseURL = "https://go-tpm2.github.io/"
title = "go-tpm2"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

# Each repo card. "result" is the honest one-line blurb (role + what is true).
# "kind" = the layer: waist / transport / api / protocol / harness.
[[params.repos]]
  name = "common"
  accel = "Transport (Send(cmd)→rsp) · Regs (MMIO) · BIG-ENDIAN TPM2 codec"
  kind = "waist"
  result = "The narrow waist: the Transport interface, the Regs MMIO accessor the MMIO transports use, the big-endian TPM2 wire codec, and the shared constants. Everything else plugs in. v0.1.0."
[[params.repos]]
  name = "tis"
  accel = "TIS / FIFO MMIO transport"
  kind = "transport"
  result = "TPM TIS/FIFO transport — the classic 0xFED4_0000 MMIO interface. Regs-driven STS / DATA_FIFO state machine; locality, Expect / dataAvail handshake. v0.1.0."
[[params.repos]]
  name = "crb"
  accel = "CRB command-buffer MMIO transport"
  kind = "transport"
  result = "TPM CRB transport — the Command/Response Buffer MMIO interface (PTP §6). Doorbell Start + goIdle / cmdReady state machine over the command/response buffers. v0.1.0."
[[params.repos]]
  name = "efitcg2"
  accel = "EFI_TCG2_PROTOCOL transport"
  kind = "transport"
  result = "EFI_TCG2_PROTOCOL transport — a firmware TPM under UEFI Boot Services, reached through an injected firmware-call closure so go-tpm2 stays UEFI-free. SubmitCommand + HashLogExtendEvent for measured boot, plus GetEventLog to fetch the firmware TCG event log. v0.2.0."
[[params.repos]]
  name = "devtpm"
  accel = "Linux /dev/tpmrm0 transport"
  kind = "transport"
  result = "A common.Transport over the Linux kernel TPM resource-manager char device /dev/tpmrm0 (one write = one command, one read = the response) — the node-side host-TPM path so attest's Node can run on a real Linux node. Validated against real swtpm via its raw-TPM2 socket. v0.1.0."
[[params.repos]]
  name = "tpm2"
  accel = "TPM 2.0 command API over any Transport"
  kind = "api"
  result = "The command API over any Transport: Startup, GetRandom, PCR_Read / PCR_Extend, GetCapability (+typed decode), SelfTest; CreatePrimary + ECC-P256 AK; remote attestation (Quote → VerifyQuote); PolicyPCR sealing; NV storage; the EK (EK Credential Profile); credential activation (MakeCredential / ActivateCredential); and Import / WrapToPCR. v0.6.0."
[[params.repos]]
  name = "attest"
  accel = "Control-plane remote-attestation protocol"
  kind = "protocol"
  result = "Control-plane remote-attestation protocol over tpm2 — a pure-Go Verifier + a Node agent implementing node-admission-on-Quote. Two-phase handshake (enrollment via MakeCredential / ActivateCredential, then admission: nonce → Quote → verify). Pluggable EKRegistry, Policy (golden PCR digests or EventLogPolicy), and PendingStore (in-memory or shared for HA control-planes). v0.3.0."
[[params.repos]]
  name = "validate"
  accel = "Real-swtpm + real-OVMF validation harness"
  kind = "harness"
  result = "Real-TPM validation harness. Drives a real swtpm over the tis and crb transports from a TamaGo+QEMU guest, runs the EFI_TCG2 measured-boot loop on real x86 OVMF firmware, and exercises the attest protocol end-to-end — including the Import / WrapToPCR flow and the attest-protocol harnesses. v0.9.0."
